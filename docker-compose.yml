version: '3.8'

services:
  ihomeguard:
    build:
      context: .
      dockerfile: Dockerfile
    image: ihomeguard:dev
    container_name: ihomeguard
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      # 爱快路由器配置（推荐使用环境变量）
      - IKUAI_URL=${IKUAI_URL:-http://192.168.1.1}
      - IKUAI_USER=${IKUAI_USER:-admin}
      - IKUAI_PASS=${IKUAI_PASS:-}
      # PushMe 推送配置
      - PUSHME_KEY=${PUSHME_KEY:-}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    ports:
      - "${WEB_PORT:-8680}:8680"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8680/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3