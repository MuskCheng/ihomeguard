services:
  ihomeguard:
    image: ihomeguard:latest
    build: .
    container_name: ihomeguard
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - IKUAI_URL=http://192.168.1.1
      - IKUAI_USER=monitor
      - IKUAI_PASS=your_password
      - PUSHME_KEY=your_pushme_key
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    ports:
      - "8680:8680"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8680/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3