services:
  ihomeguard:
    image: crpi-2paq7xeeayrc2fy6.cn-zhangjiakou.personal.cr.aliyuncs.com/eddycheng/ihomeguard:latest
    container_name: ihomeguard
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      # 爱快路由器配置（可选，也可通过 Web 界面配置）
      # - IKUAI_URL=http://192.168.1.1
      # - IKUAI_USER=monitor
      # - IKUAI_PASS=your_password
      # PushMe 推送配置（可选）
      # - PUSHME_KEY=your_pushme_key
    volumes:
      # 数据持久化
      - ./data:/app/data
      - ./config:/app/config
    ports:
      - "8680:8680"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8680/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3