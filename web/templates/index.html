<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iHomeGuard - 爱快家庭网络卫士</title>
    <link rel="icon" type="image/png" href="/static/iHG.png">
    <link rel="apple-touch-icon" href="/static/iHG.png">
    <script src="/static/js/vue.min.js"></script>
    <script src="/static/js/axios.min.js"></script>
    <script src="/static/js/chart.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* ========== 夜间模式 (默认) ========== */
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.7);
            --bg-card-hover: rgba(17, 24, 39, 0.9);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-cyan: #06b6d4;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --border-color: rgba(148, 163, 184, 0.1);
            --border-hover: rgba(6, 182, 212, 0.3);
            --glow-cyan: 0 0 20px rgba(6, 182, 212, 0.3);
            --glow-purple: 0 0 20px rgba(139, 92, 246, 0.3);
            --glow-green: 0 0 20px rgba(16, 185, 129, 0.3);
            --gradient-primary: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            --gradient-bg: radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                           radial-gradient(ellipse at 80% 80%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
                           radial-gradient(ellipse at 40% 60%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-focus-bg: rgba(255, 255, 255, 0.08);
            --table-hover: rgba(6, 182, 212, 0.05);
            --section-title-border: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
        }
        
        /* ========== 日间模式 ========== */
        :root.light-mode {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --bg-card-hover: rgba(255, 255, 255, 1);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-cyan: #0891b2;
            --accent-purple: #7c3aed;
            --accent-pink: #db2777;
            --accent-green: #059669;
            --accent-orange: #d97706;
            --accent-red: #dc2626;
            --border-color: rgba(148, 163, 184, 0.2);
            --border-hover: rgba(8, 145, 178, 0.4);
            --glow-cyan: 0 4px 20px rgba(8, 145, 178, 0.15);
            --glow-purple: 0 4px 20px rgba(124, 58, 237, 0.15);
            --glow-green: 0 4px 20px rgba(5, 150, 105, 0.15);
            --gradient-primary: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            --gradient-bg: radial-gradient(ellipse at 20% 20%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
                           radial-gradient(ellipse at 80% 80%, rgba(8, 145, 178, 0.08) 0%, transparent 50%),
                           radial-gradient(ellipse at 40% 60%, rgba(219, 39, 119, 0.05) 0%, transparent 50%);
            --input-bg: rgba(0, 0, 0, 0.03);
            --input-focus-bg: rgba(0, 0, 0, 0.05);
            --table-hover: rgba(8, 145, 178, 0.05);
            --section-title-border: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }
        
        /* 动态背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--gradient-bg);
            pointer-events: none;
            z-index: -1;
            animation: bgPulse 15s ease-in-out infinite;
            transition: background 0.4s ease;
        }
        
        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* 导航栏 */
        .navbar {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            transition: all 0.3s ease;
        }
        
        .navbar h1 {
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .navbar h1 .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(6, 182, 212, 0.3);
            transition: transform 0.3s ease;
        }
        
        .navbar h1:hover .logo-icon {
            transform: scale(1.05);
        }
        
        .navbar h1 .logo-text {
            font-size: 1.4rem;
            font-weight: 700;
        }
        
        .navbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        /* 主题切换按钮 */
        .theme-toggle {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }
        
        .theme-toggle:hover {
            background: var(--input-focus-bg);
            border-color: var(--border-hover);
            transform: scale(1.05);
        }
        
        .nav-links {
            display: flex;
            gap: 8px;
            background: var(--input-bg);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .nav-links a::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary);
        }
        
        .nav-links a:hover::before, .nav-links a.active::before {
            opacity: 0.15;
        }
        
        .nav-links a.active {
            box-shadow: var(--glow-cyan);
        }
        
        /* 主内容 */
        .main {
            margin-top: 64px;
            padding: 24px;
            max-width: 1440px;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* 玻璃态卡片 */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin-bottom: 24px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--glow-cyan);
        }
        
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--input-bg);
        }
        
        .card-title-icon {
            flex-shrink: 0;
        }
        
        .card-body {
            padding: 24px;
        }
        
        /* 统计卡片网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            min-width: 0;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-hover);
            box-shadow: var(--glow-cyan);
        }
        
        .stat-card:hover::before {
            opacity: 1;
        }
        
        .stat-card .icon {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }
        
        .stat-card .value {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.4;
            min-height: 2.2rem;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .stat-card .value.upload {
            color: var(--accent-cyan);
        }
        
        .stat-card .value.download {
            color: var(--accent-green);
        }
        
        .stat-card .value.primary {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-card .label {
            color: var(--text-secondary);
            margin-top: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        /* 表格 */
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .table th, .table td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        .table th {
            background: var(--input-bg);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }
        
        .table tr {
            transition: all 0.2s;
        }
        
        .table tbody tr:hover {
            background: var(--table-hover);
        }
        
        .table .online { color: var(--accent-green); }
        .table .offline { color: var(--text-muted); }
        
        /* 设备图标 */
        .device-icon {
            font-size: 1.8rem;
            margin-right: 12px;
            vertical-align: middle;
        }
        
        .device-name {
            vertical-align: middle;
            font-weight: 500;
        }
        
        /* 标签 */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .badge-success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .badge-warning {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-orange);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        
        .badge-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .badge-info {
            background: rgba(6, 182, 212, 0.15);
            color: var(--accent-cyan);
            border: 1px solid rgba(6, 182, 212, 0.3);
        }
        
        .badge-trusted {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(139, 92, 246, 0.2));
            color: var(--accent-green);
            border: 1px solid rgba(16, 185, 129, 0.4);
        }
        
        /* 按钮 */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--glow-cyan);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-purple);
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--accent-green), #059669);
            color: white;
            box-shadow: var(--glow-green);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--accent-red), #dc2626);
            color: white;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 8px;
        }
        
        .btn:hover {
            transform: translateY(-1px);
        }
        
        /* 表单 */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--text-primary);
            transition: all 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
            background: var(--input-focus-bg);
        }
        
        .form-control::placeholder {
            color: var(--text-muted);
        }
        
        select.form-control {
            cursor: pointer;
            max-width: 250px;
        }
        
        select.form-control option {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .form-row {
            display: flex;
            gap: 20px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        /* 告警列表 */
        .alert-item {
            padding: 16px 20px;
            border-left: 4px solid;
            margin-bottom: 12px;
            background: var(--input-bg);
            border-radius: 0 12px 12px 0;
            transition: all 0.3s;
        }
        
        .alert-item:hover {
            background: var(--input-focus-bg);
        }
        
        .alert-warning {
            border-color: var(--accent-orange);
        }
        
        .alert-danger {
            border-color: var(--accent-red);
        }
        
        .alert-info {
            border-color: var(--accent-cyan);
        }
        
        /* 图表容器 */
        .chart-container {
            position: relative;
            height: 320px;
        }
        
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        
        @media (max-width: 900px) {
            .chart-row { grid-template-columns: 1fr; }
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        
        /* ========== 移动端菜单按钮 ========== */
        .menu-toggle {
            display: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            z-index: 201;
        }

        .menu-toggle:hover {
            background: var(--input-focus-bg);
            border-color: var(--border-hover);
        }

        /* ========== 移动端抽屉菜单 ========== */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.3);
        }

        .mobile-menu.open {
            transform: translateX(0);
        }

        .mobile-menu-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mobile-menu-header img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
        }

        .mobile-menu-header span {
            font-size: 1.2rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .mobile-menu-nav {
            padding: 16px;
            flex: 1;
        }

        .mobile-menu-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .mobile-menu-nav a:hover,
        .mobile-menu-nav a.active {
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .mobile-menu-nav a.active {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(139, 92, 246, 0.15));
            border: 1px solid var(--border-hover);
        }

        .mobile-menu-nav a span {
            font-size: 1.3rem;
        }

        .mobile-menu-footer {
            padding: 16px;
            border-top: 1px solid var(--border-color);
        }

        /* 移动端遮罩层 */
        .mobile-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 199;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .mobile-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* ========== 移动端设备卡片样式 ========== */
        .device-cards {
            display: none;
        }

        .device-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .device-card:hover {
            border-color: var(--border-hover);
        }

        .device-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .device-card-icon {
            font-size: 2rem;
        }

        .device-card-info {
            flex: 1;
            min-width: 0;
        }

        .device-card-name {
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .device-card-vendor {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .device-card-ip {
            font-size: 0.85rem;
            color: var(--accent-cyan);
            font-family: monospace;
        }

        .device-card-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .device-stat {
            background: var(--input-bg);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .device-stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .device-stat-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .device-stat-value.upload { color: var(--accent-cyan); }
        .device-stat-value.download { color: var(--accent-green); }

        .device-card-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .device-card-actions .btn {
            flex: 1;
            min-width: 60px;
        }

        /* ========== 响应式样式 ========== */
        @media (max-width: 768px) {
            .navbar { padding: 0 16px; }
            .navbar h1 { font-size: 1.1rem; }
            .navbar h1 .logo-text { display: none; }
            .theme-toggle { width: 38px; height: 38px; font-size: 1.1rem; }
            .main { padding: 16px; padding-top: 80px; }
            
            /* 显示移动端菜单按钮 */
            .menu-toggle { display: flex; }
            
            /* 隐藏桌面端导航 */
            .nav-links { display: none; }
            
            /* 显示移动端菜单 */
            .mobile-menu { display: flex; }
            .mobile-overlay { display: block; }
            
            /* 统计卡片 */
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-card { padding: 14px; }
            .stat-card .value { font-size: 1.3rem; }
            .stat-card .label { font-size: 0.75rem; }
            .stat-card .icon { font-size: 1.6rem; }
            
            /* 隐藏表格，显示卡片 */
            .table { display: none; }
            .device-cards { display: block; }
            
            /* 卡片头部 */
            .card-header { 
                padding: 14px 16px; 
                font-size: 0.9rem; 
                flex-wrap: wrap; 
                gap: 10px;

            margin-top: 20px;
        }
        
        .prediction-box h4 {
            margin-bottom: 16px;
            color: var(--accent-cyan);
            font-size: 1rem;
        }
        
        /* 信任设备标识 */
        .trusted-badge {
            background: linear-gradient(135deg, var(--accent-green), #059669);
            color: white;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            margin-left: 8px;
            font-weight: 600;
        }
        
        /* 复选框样式 */
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-cyan);
            cursor: pointer;
        }
        
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.3);
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 认证弹窗（注册/登录） -->
        <div v-if="authRequired && !authenticated" class="login-overlay">
            <div class="login-dialog">
                <!-- 注册界面（首次初始化） -->
                <template v-if="needsInit">
                    <div class="login-header">
                        <img src="/static/iHG.png" alt="iHG" class="login-logo">
                        <h2>iHomeGuard</h2>
                        <p>首次运行，请创建管理员账户</p>
                    </div>
                    <div class="login-form">
                        <input type="text" 
                               class="form-control login-input" 
                               v-model="registerUsername" 
                               placeholder="管理员用户名"
                               @keyup.enter="$refs.registerPassword.focus()"
                               autofocus>
                        <input type="password" 
                               class="form-control login-input" 
                               v-model="registerPassword" 
                               placeholder="设置密码（至少6位）"
                               ref="registerPassword"
                               @keyup.enter="$refs.registerPasswordConfirm.focus()">
                        <input type="password" 
                               class="form-control login-input" 
                               v-model="registerPasswordConfirm" 
                               placeholder="再次输入密码"
                               ref="registerPasswordConfirm"
                               @keyup.enter="doRegister">
                        <button class="btn btn-primary login-btn" @click="doRegister" :disabled="registering">
                            <span v-if="registering" class="spinning">⏳</span>
                            <span v-else>创建账户</span>
                        </button>
                        <div v-if="registerError" class="login-error">{{ registerError }}</div>
                    </div>
                </template>
                
                <!-- 登录界面 -->
                <template v-else>
                    <div class="login-header">
                        <img src="/static/iHG.png" alt="iHG" class="login-logo">
                        <h2>iHomeGuard</h2>
                        <p>请登录以继续访问</p>
                    </div>
                    <div class="login-form">
                        <input type="text" 
                               class="form-control login-input" 
                               v-model="loginUsername" 
                               placeholder="用户名"
                               @keyup.enter="$refs.passwordInput.focus()"
                               autofocus>
                        <input type="password" 
                               class="form-control login-input" 
                               v-model="loginPassword" 
                               placeholder="密码"
                               ref="passwordInput"
                               @keyup.enter="doLogin">
                        <button class="btn btn-primary login-btn" @click="doLogin" :disabled="loggingIn">
                            <span v-if="loggingIn" class="spinning">⏳</span>
                            <span v-else>登录</span>
                        </button>
                        <div v-if="loginError" class="login-error">{{ loginError }}</div>
                    </div>
                </template>
            </div>
        </div>
        
        <!-- 主内容（需要认证时隐藏） -->
        <template v-if="!authRequired || authenticated">
        
        <!-- 移动端遮罩层 -->
        <div class="mobile-overlay" :class="{show: mobileMenuOpen}" @click="closeMobileMenu"></div>
        
        <!-- 移动端抽屉菜单 -->
        <div class="mobile-menu" :class="{open: mobileMenuOpen}">
            <div class="mobile-menu-header">
                <img src="/static/iHG.png" alt="iHG">
                <span>iHomeGuard</span>
            </div>
            <nav class="mobile-menu-nav">
                <a href="#" :class="{active: currentPage==='devices'}" @click="navigateTo('devices')">
                    <span>📱</span> 设备
                </a>
                <a href="#" :class="{active: currentPage==='stats'}" @click="navigateTo('stats')">
                    <span>📊</span> 统计
                </a>
                <a href="#" :class="{active: currentPage==='alerts'}" @click="navigateTo('alerts')">
                    <span>🔔</span> 告警
                </a>
                <a href="#" :class="{active: currentPage==='settings'}" @click="navigateTo('settings')">
                    <span>⚙️</span> 设置
                </a>
            </nav>
            <div class="mobile-menu-footer">
                <button class="btn" style="width:100%; justify-content: center;" @click="toggleTheme">
                    {{ isDarkMode ? '☀️ 切换日间模式' : '🌙 切换夜间模式' }}
                </button>
            </div>
        </div>
        
        <!-- 导航栏 -->
        <nav class="navbar">
            <button class="menu-toggle" @click="toggleMobileMenu">☰</button>
            <h1>
                <img src="/static/iHG.png" alt="iHG" class="logo-icon">
                <span class="logo-text">iHomeGuard</span>
            </h1>
            <div class="navbar-right">
                <div class="nav-links">
                    <a href="#" :class="{active: currentPage==='devices'}" @click="currentPage='devices'">设备</a>
                    <a href="#" :class="{active: currentPage==='stats'}" @click="currentPage='stats'">统计</a>
                    <a href="#" :class="{active: currentPage==='alerts'}" @click="currentPage='alerts'">告警</a>
                    <a href="#" :class="{active: currentPage==='settings'}" @click="currentPage='settings'">设置</a>
                </div>
                <button class="theme-toggle" @click="toggleTheme" :title="isDarkMode ? '切换到日间模式' : '切换到夜间模式'">
                    {{ isDarkMode ? '☀️' : '🌙' }}
                </button>
            </div>
        </nav>
        
        <main class="main">
            <!-- 设备页面 -->
            <div class="page" :class="{active: currentPage==='devices'}">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="icon">📱</div>
                        <div class="value primary">{{ onlineCount }}</div>
                        <div class="label">在线设备</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">🔌</div>
                        <div class="value" :class="connectionClass">{{ totalConnections }}</div>
                        <div class="label">连接数</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">⬆️</div>
                        <div class="value upload">{{ formatSpeed(totalUploadSpeed) }}</div>
                        <div class="label">实时上传</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">⬇️</div>
                        <div class="value download">{{ formatSpeed(totalDownloadSpeed) }}</div>
                        <div class="label">实时下载</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">📤</div>
                        <div class="value upload">{{ formatBytes(totalUpload) }}</div>
                        <div class="label">今日上传</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">📊</div>
                        <div class="value primary">{{ formatBytes(totalTraffic) }}</div>
                        <div class="label">今日总流量</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <span class="card-title-icon">📱</span>
                        <span>在线设备列表 ({{ onlineCount }} 台)</span>
                        <button class="btn btn-primary btn-sm" @click="refreshDevices" :disabled="loading" style="margin-left: auto;">
                            🔄 刷新
                        </button>
                    </div>
                    <div class="card-body">
                        <!-- 移动端设备卡片 -->
                        <div class="device-cards">
                            <div class="device-card" v-for="device in devices" :key="device.mac">
                                <div class="device-card-header">
                                    <span class="device-card-icon">{{ getDeviceIcon(device) }}</span>
                                    <div class="device-card-info">
                                        <div class="device-card-name">
                                            <strong>{{ device.alias || device.hostname || device.mac.slice(0,8) }}</strong>
                                            <span v-if="device.is_trusted" class="trusted-badge">信任</span>
                                        </div>
                                        <div class="device-card-vendor">{{ device.vendor || 'Unknown' }}</div>
                                        <div class="device-card-ip">{{ device.ip }}</div>
                                    </div>
                                </div>
                                <div class="device-card-stats">
                                    <div class="device-stat">
                                        <div class="device-stat-label">上传速度</div>
                                        <div class="device-stat-value upload">⬆ {{ formatSpeed(device.upload_speed) }}</div>
                                    </div>
                                    <div class="device-stat">
                                        <div class="device-stat-label">下载速度</div>
                                        <div class="device-stat-value download">⬇ {{ formatSpeed(device.download_speed) }}</div>
                                    </div>
                                    <div class="device-stat">
                                        <div class="device-stat-label">今日流量</div>
                                        <div class="device-stat-value">{{ formatBytes(device.total_upload + device.total_download) }}</div>
                                    </div>
                                    <div class="device-stat">
                                        <div class="device-stat-label">在线/连接</div>
                                        <div class="device-stat-value">{{ device.today_online_formatted || '-' }} / {{ device.connections }}</div>
                                    </div>
                                </div>
                                <div class="device-card-actions">
                                    <button class="btn btn-sm" @click="editDevice(device)" title="编辑">📝 备注</button>
                                    <button class="btn btn-sm" @click="toggleTrust(device)" :title="device.is_trusted ? '取消信任' : '设为信任'">
                                        {{ device.is_trusted ? '✅ 已信任' : '⭐ 信任' }}
                                    </button>
                                    <button class="btn btn-sm btn-danger" @click="kickDevice(device)" title="踢下线">🚫 踢下线</button>
                                </div>
                            </div>
                            <div v-if="devices.length === 0" class="loading">暂无在线设备</div>
                        </div>
                        
                        <!-- 桌面端表格 -->
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>设备</th>
                                    <th>IP 地址</th>
                                    <th>上传/下载速度</th>
                                    <th>今日流量</th>
                                    <th>在线时长</th>
                                    <th>连接数</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="device in devices" :key="device.mac">
                                    <td>
                                        <span class="device-icon">{{ getDeviceIcon(device) }}</span>
                                        <span class="device-name">
                                            <strong>{{ device.alias || device.hostname || device.mac.slice(0,8) }}</strong>
                                            <span v-if="device.is_trusted" class="trusted-badge">信任</span>
                                        </span>
                                        <br>
                                        <small style="color:var(--text-muted)">{{ device.vendor || 'Unknown' }}</small>
                                    </td>
                                    <td>{{ device.ip }}</td>
                                    <td>
                                        <span style="color:var(--accent-cyan)">⬆{{ formatSpeed(device.upload_speed) }}</span><br>
                                        <span style="color:var(--accent-green)">⬇{{ formatSpeed(device.download_speed) }}</span>
                                    </td>
                                    <td>
                                        <span style="color:var(--accent-cyan)">⬆{{ formatBytes(device.total_upload) }}</span><br>
                                        <span style="color:var(--accent-green)">⬇{{ formatBytes(device.total_download) }}</span>
                                    </td>
                                    <td>{{ device.today_online_formatted || '-' }}</td>
                                    <td>{{ device.connections }}</td>
                                    <td>
                                        <button class="btn btn-sm" @click="editDevice(device)" title="编辑">📝</button>
                                        <button class="btn btn-sm" @click="toggleTrust(device)" :title="device.is_trusted ? '取消信任' : '设为信任'">
                                            {{ device.is_trusted ? '✅' : '⭐' }}
                                        </button>
                                        <button class="btn btn-sm btn-danger" @click="kickDevice(device)" title="踢下线">🚫</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <div v-if="devices.length === 0" class="loading">暂无在线设备</div>
                    </div>
                </div>
            </div>
            
            <!-- 统计页面 -->
            <div class="page" :class="{active: currentPage==='stats'}">
                <!-- 统计摘要卡片 -->
                <div class="stats-summary">
                    <div class="summary-card summary-upload">
                        <div class="summary-icon">📤</div>
                        <div class="summary-content">
                            <div class="summary-label">本月上传</div>
                            <div class="summary-value">{{ formatBytes(prediction?.upload || 0) }}</div>
                        </div>
                    </div>
                    <div class="summary-card summary-download">
                        <div class="summary-icon">📥</div>
                        <div class="summary-content">
                            <div class="summary-label">本月下载</div>
                            <div class="summary-value">{{ formatBytes(prediction?.download || 0) }}</div>
                        </div>
                    </div>
                    <div class="summary-card summary-total">
                        <div class="summary-icon">📊</div>
                        <div class="summary-content">
                            <div class="summary-label">本月总流量</div>
                            <div class="summary-value">{{ formatBytes(prediction?.total || 0) }}</div>
                        </div>
                    </div>
                    <div class="summary-card summary-daily">
                        <div class="summary-icon">📈</div>
                        <div class="summary-content">
                            <div class="summary-label">日均流量</div>
                            <div class="summary-value">{{ formatBytes(prediction?.daily_avg || 0) }}</div>
                        </div>
                    </div>
                </div>
                
                <!-- 实时流量图 -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-title-icon">📡</span>
                        实时流量监控（最近24小时）
                    </div>
                    <div class="card-body">
                        <div class="chart-container chart-large">
                            <canvas id="realtimeChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- 连接数监控 -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-title-icon">🔌</span>
                        连接数监控（最近24小时）
                    </div>
                    <div class="card-body">
                        <div class="chart-container chart-large">
                            <canvas id="connectionChart"></canvas>
                        </div>
                    </div>
                </div>
                
                <!-- 流量趋势图 -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-title-icon">📊</span>
                        流量趋势（最近14天）
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="trafficChart"></canvas>
                        </div>
                    </div>
                </div>
                
                <!-- 流量预测 -->
                <div class="card prediction-card">
                    <div class="card-header">
                        <span class="card-title-icon">🔮</span>
                        本月流量预测
                    </div>
                    <div class="card-body">
                        <div class="prediction-grid" v-if="prediction">
                            <div class="prediction-item-box">
                                <div class="prediction-icon upload-icon">⬆️</div>
                                <div class="prediction-info">
                                    <span class="prediction-label">预计上传</span>
                                    <span class="prediction-value">{{ formatBytes(prediction.upload) }}</span>
                                </div>
                            </div>
                            <div class="prediction-item-box">
                                <div class="prediction-icon download-icon">⬇️</div>
                                <div class="prediction-info">
                                    <span class="prediction-label">预计下载</span>
                                    <span class="prediction-value">{{ formatBytes(prediction.download) }}</span>
                                </div>
                            </div>
                            <div class="prediction-item-box">
                                <div class="prediction-icon total-icon">📊</div>
                                <div class="prediction-info">
                                    <span class="prediction-label">预计总量</span>
                                    <span class="prediction-value highlight">{{ formatBytes(prediction.total) }}</span>
                                </div>
                            </div>
                            <div class="prediction-item-box">
                                <div class="prediction-icon daily-icon">📈</div>
                                <div class="prediction-info">
                                    <span class="prediction-label">日均流量</span>
                                    <span class="prediction-value">{{ formatBytes(prediction.daily_avg) }}</span>
                                </div>
                            </div>
                        </div>
                        <div v-else class="loading">
                            <span class="loading-spinner">⏳</span> 加载预测数据...
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 告警页面 -->
            <div class="page" :class="{active: currentPage==='alerts'}">
                <div class="card">
                    <div class="card-header">
                        <span class="card-title-icon">⚠️</span>
                        <span>告警记录 ({{ alerts.length }} 条未处理)</span>
                        <div style="margin-left: auto; display: flex; gap: 8px;">
                            <button v-if="alerts.length > 0" class="btn btn-sm btn-success" @click="resolveAllAlerts" :disabled="resolvingAll">
                                <span v-if="resolvingAll" class="spinning">⏳</span>
                                <span v-else>✓ 一键处理</span>
                            </button>
                            <button class="btn btn-sm" @click="refreshAlerts">🔄 刷新</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- 移动端告警卡片 -->
                        <div class="alert-cards">
                            <div v-for="alert in alerts" :key="alert.id" class="alert-card" :class="'alert-' + alert.severity">
                                <div class="alert-card-header">
                                    <span class="alert-card-type">[{{ getAlertTypeLabel(alert.alert_type) }}]</span>
                                    <span class="alert-card-time">{{ alert.created_at }}</span>
                                </div>
                                <div class="alert-card-message">{{ alert.message }}</div>
                                <button class="btn btn-sm btn-primary alert-card-action" @click="resolveAlert(alert.id)">✓ 标记已处理</button>
                            </div>
                            <div v-if="alerts.length === 0" class="loading">暂无告警 ✅</div>
                        </div>
                        
                        <!-- 桌面端告警列表 -->
                        <div v-for="alert in alerts" :key="alert.id" class="alert-item" :class="'alert-' + alert.severity">
                            <strong>[{{ getAlertTypeLabel(alert.alert_type) }}]</strong> {{ alert.message }}
                            <small style="float:right;color:var(--text-muted)">{{ alert.created_at }}</small>
                            <button class="btn btn-sm" style="float:right;margin-right:10px" @click="resolveAlert(alert.id)">处理</button>
                        </div>
                        <div v-if="alerts.length === 0" class="loading">暂无告警 ✅</div>
                    </div>
                </div>
            </div>
            
            <!-- 设置页面 -->
            <div class="page" :class="{active: currentPage==='settings'}">
                <div class="card">
                    <div class="card-header">
                        <span class="card-title-icon">⚙️</span>
                        <span>系统设置</span>
                    </div>
                    <div class="card-body">
                        <!-- 1. 连接配置 -->
                        <div class="settings-section">
                            <h3>🔌 连接配置</h3>
                            <div class="security-tip">
                                <strong>🔒 安全建议：</strong>请勿使用管理员账户！建议创建<strong>只读账户</strong>用于数据采集。
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>路由器地址</label>
                                    <input type="text" class="form-control" v-model="config.ikuai.local_url" placeholder="http://192.168.1.1">
                                </div>
                                <div class="form-group">
                                    <label>用户名</label>
                                    <input type="text" class="form-control" v-model="config.ikuai.username" placeholder="只读账户用户名">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>密码</label>
                                <input type="password" class="form-control" v-model="config.ikuai.password" :placeholder="config.ikuai.password === '****' ? '密码已保存，输入新密码可修改' : '输入只读账户密码'">
                                <small style="color: var(--text-muted); display: block; margin-top: 5px;">
                                    <span v-if="config.ikuai.password === '****'">✅ 密码已加密保存</span>
                                    <span v-else>密码将被加密存储</span>
                                </small>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>会话超时（分钟）</label>
                                    <input type="number" class="form-control" v-model="config.ikuai.session_timeout" min="10" max="1440">
                                    <small style="color: var(--text-muted); display: block; margin-top: 5px;">与爱快系统账号配置保持一致</small>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button class="btn btn-primary" @click="testIkuai" :disabled="testingIkuai">
                                    <span v-if="testingIkuai" class="spinning">⏳</span>
                                    <span v-else>🔌 测试连接</span>
                                </button>
                                <transition name="fade">
                                    <span v-if="ikuaiStatus" class="status-badge" :class="ikuaiStatus.success ? 'status-success' : 'status-error'">
                                        <span v-if="ikuaiStatus.success">✅</span>
                                        <span v-else>❌</span>
                                        {{ ikuaiStatus.message }}
                                    </span>
                                </transition>
                            </div>
                        </div>
                        
                        <!-- 2. 消息推送 -->
                        <div class="settings-section">
                            <h3>🔔 消息推送</h3>
                            
                            <!-- 全局开关 -->
                            <div class="form-group">
                                <label><input type="checkbox" v-model="config.push.enabled"> 启用推送通知</label>
                            </div>
                            
                            <div class="form-group">
                                <label>推送渠道</label>
                                <select class="form-control" v-model="pushChannel">
                                    <option value="pushme">PushMe</option>
                                    <option value="wecom">企业微信</option>
                                    <option value="dingtalk">钉钉</option>
                                    <option value="telegram">Telegram</option>
                                    <option value="feishu">飞书</option>
                                    <option value="bark">Bark (iOS)</option>
                                    <option value="serverchan">Server酱</option>
                                    <option value="pushplus">PushPlus</option>
                                    <option value="smtp">邮件 (SMTP)</option>
                                    <option value="webhook">自定义 Webhook</option>
                                </select>
                            </div>
                            
                            <!-- PushMe -->
                            <div v-show="pushChannel==='pushme'">
                                <div class="form-group">
                                    <label>Push Key</label>
                                    <input type="text" class="form-control" v-model="config.push.channels.pushme.push_key" placeholder="你的 push_key">
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>分组名称</label>
                                        <input type="text" class="form-control" v-model="config.push.channels.pushme.group" placeholder="iHomeGuard">
