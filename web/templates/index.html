                                <!-- 修改密码 -->
                                <div style="background: var(--input-bg); border-radius: 12px; padding: 16px; margin-bottom: 16px;">
                                    <h4 style="font-size: 0.9rem; margin-bottom: 12px; color: var(--text-secondary);">修改密码</h4>
                                    <div class="form-group" style="margin-bottom: 12px;">
                                        <input type="password" class="form-control" v-model="changePasswordOld"
                                               placeholder="原密码" style="font-size: 0.9rem;">
                                    </div>
                                    <div class="form-group" style="margin-bottom: 12px;">
                                        <input type="password" class="form-control" v-model="changePasswordNew"
                                               placeholder="新密码（至少6位）" style="font-size: 0.9rem;">
                                    </div>
                                    <div class="form-group" style="margin-bottom: 12px;">
                                        <input type="password" class="form-control" v-model="changePasswordConfirm"
                                               placeholder="再次输入新密码" style="font-size: 0.9rem;">
                                    </div>
                                    <button class="btn btn-primary btn-sm" @click="doChangePassword" :disabled="changingPassword">
                                        <span v-if="changingPassword" class="spinning">⏳</span>
                                        <span v-else>修改密码</span>
                                    </button>
                                    <div v-if="changePasswordError" style="color: var(--accent-red); font-size: 0.8rem; margin-top: 8px;">
                                        {{ changePasswordError }}
                                    </div>
                                    <div v-if="changePasswordSuccess" style="color: var(--accent-green); font-size: 0.8rem; margin-top: 8px;">
                                        {{ changePasswordSuccess }}
                                    </div>
                                </div>

                                <!-- 用户管理（管理员可见） -->
                                <div v-if="currentUserRole === 'admin'" style="background: var(--input-bg); border-radius: 12px; padding: 16px;">
                                    <h4 style="font-size: 0.9rem; margin-bottom: 12px; color: var(--text-secondary);">用户管理</h4>
                                    <div v-for="user in userList" :key="user.username"
                                         style="display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color);">
                                        <div>
                                            <span style="font-weight: 500;">{{ user.username }}</span>
                                            <span class="badge" :class="user.role === 'admin' ? 'badge-trusted' : 'badge-info'" style="margin-left: 8px;">
                                                {{ user.role === 'admin' ? '管理员' : '用户' }}
                                            </span>
                                            <span v-if="user.username === currentUsername" class="badge badge-success" style="margin-left: 4px;">当前</span>
                                        </div>
                                        <button v-if="user.username !== currentUsername"
                                                class="btn btn-sm" style="background: rgba(239, 68, 68, 0.1); color: var(--accent-red); padding: 4px 10px;"
                                                @click="confirmDeleteUser(user.username)">
                                            删除
                                        </button>
                                    </div>

                                    <!-- 添加用户 -->
                                    <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color);">
                                        <h4 style="font-size: 0.85rem; margin-bottom: 10px; color: var(--text-muted);">添加新用户</h4>
                                        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                            <input type="text" class="form-control" v-model="newUsername"
                                                   placeholder="用户名" style="flex: 1; min-width: 100px; font-size: 0.85rem;">
                                            <input type="password" class="form-control" v-model="newUserPassword"
                                                   placeholder="密码" style="flex: 1; min-width: 100px; font-size: 0.85rem;">
                                            <select class="form-control" v-model="newUserRole" style="width: auto; font-size: 0.85rem;">
                                                <option value="user">用户</option>
                                                <option value="admin">管理员</option>
                                            </select>
                                            <button class="btn btn-primary btn-sm" @click="doAddUser" :disabled="addingUser">
                                                <span v-if="addingUser" class="spinning">⏳</span>
                                                <span v-else>添加</span>
                                            </button>
                                        </div>
                                        <div v-if="addUserError" style="color: var(--accent-red); font-size: 0.8rem; margin-top: 8px;">
                                            {{ addUserError }}
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <!-- 7. 关于 -->
                        <div class="settings-section">
                            <h3>ℹ️ 关于</h3>
                            <div class="about-info">
                                <div class="about-item">
                                    <span class="about-label">软件名称</span>
                                    <span class="about-value">iHomeGuard 爱快家庭网络卫士</span>
                                </div>
                                <div class="about-item">
                                    <span class="about-label">当前版本</span>
                                    <span class="about-value">
                                        v{{ systemInfo.version || '...' }}
                                        <span v-if="updateInfo.has_update" class="badge badge-warning" style="margin-left: 8px;">新版本 {{ updateInfo.latest_version }}</span>
                                    </span>
                                </div>
                                <div v-if="updateInfo.has_update" class="about-item">
                                    <span class="about-label">最新版本</span>
                                    <span class="about-value" style="color: var(--accent-green);">{{ updateInfo.latest_version }}</span>
                                </div>
                            </div>
                            <div class="form-actions" style="margin-top: 15px;">
                                <button class="btn btn-primary" @click="checkForUpdate" :disabled="checkingUpdate">
                                    <span v-if="checkingUpdate" class="spinning">⏳</span>
                                    <span v-else>🔍 检查更新</span>
                                </button>
                                <a href="https://github.com/MuskCheng/ihomeguard" target="_blank" class="btn" style="background: var(--input-bg); border: 1px solid var(--border-color); text-decoration: none;">
                                    📦 GitHub
                                </a>
                            </div>
                            <!-- 检查更新状态 -->
                            <div class="update-status" style="margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; text-align: center;"
                                 :style="updateStatusStyle">
                                <span v-if="checkingUpdate">⏳ 正在检查更新...</span>
                                <span v-else-if="updateInfo.error" style="color: var(--accent-orange);">❌ {{ updateInfo.error }}</span>
                                <span v-else-if="updateInfo.has_update" style="color: var(--accent-green);">🎉 发现新版本 {{ updateInfo.latest_version }}，请前往 GitHub 下载更新</span>
                                <span v-else-if="updateInfo.checked && !updateInfo.has_update" style="color: var(--accent-cyan);">✅ 当前已是最新版本</span>
                            </div>
                            <!-- 更新日志 -->
                            <div v-if="updateInfo.releases && updateInfo.releases.length > 0" class="changelog-section" style="margin-top: 20px;">
                                <h4 style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 12px;">📝 最近更新</h4>
                                <div class="changelog-list">
                                    <div v-for="release in updateInfo.releases" :key="release.version" class="changelog-item">
                                        <div class="changelog-header">
                                            <span class="changelog-version">{{ release.version }}</span>
                                            <span class="changelog-date">{{ formatDate(release.published_at) }}</span>
                                        </div>
                                        <div class="changelog-body" v-html="formatChangelog(release.body)"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <button class="btn btn-success" @click="saveSettings">💾 保存设置</button>
                    </div>
                </div>
            </div>
        </main>
        </template>
    </div>
    
    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    currentPage: 'devices',
                    mobileMenuOpen: false,
                    loading: false,
                    devices: [],
                    alerts: [],
                    resolvingAll: false,
                    config: {
                        ikuai: { local_url: '', username: '', password: '', session_timeout: 120 },
                        push: {
                            enabled: true,
                            channels: {
                                pushme: { enabled: true, push_key: '', api_url: 'https://push.i-i.me', group: 'iHomeGuard', icon: '🏠' },
                                wecom: { enabled: false, webhook: '' },
                                dingtalk: { enabled: false, webhook: '', secret: '' },
                                telegram: { enabled: false, bot_token: '', user_id: '', api_host: '' },
                                feishu: { enabled: false, webhook: '' },
                                bark: { enabled: false, push_key: '', sound: '', group: '' },
                                serverchan: { enabled: false, push_key: '' },
                                pushplus: { enabled: false, token: '', channel: 'wechat', template: 'html' },
                                smtp: { enabled: false, server: '', ssl: true, email: '', password: '', name: 'iHomeGuard' },
                                webhook: { enabled: false, url: '', method: 'POST', content_type: 'application/json' }
                            }
                        },
                        pushme: { push_key: '', enabled: true, wecom_webhook: '', dingtalk_webhook: '', dingtalk_secret: '' },
                                                            monitor: { collect_interval: 10, report_time: '07:00', alert_new_device: true, alert_offline: true, traffic_threshold_gb: 10, long_online_hours: 24, upload_speed_threshold_kbps: 10240, download_speed_threshold_kbps: 51200, high_connection_threshold: 500, total_connection_threshold: 1000 },
                        auth: { enabled: false }                    },
                    prediction: null,
                    pushChannel: 'pushme',
                    ikuaiStatus: null,
                    testingIkuai: false,
                    connectionTested: false,
                    pushStatus: null,
                testingPush: false,
                    trafficChart: null,

                    realtimeChart: null,
                    connectionChart: null,
                    realtimeData: { labels: [], upload: [], download: [] },
                    trafficRange: '1d',
                    currentConnections: 0,
                    isDarkMode: true,
                    dbStats: null,
                    cleaningDb: false,
                    systemInfo: { version: '' },
                    updateInfo: { has_update: false, releases: [], error: '', checked: false },
                    checkingUpdate: false,
                    // 备份相关
                    backupStats: null,
                    exportOptions: { includeDevices: true, includeAlerts: false },
                    exporting: false,
                    importing: false,
                    backupStatus: null,
                    showImportDialog: false,
                    pendingImport: null,
                    importMergeMode: true,
                    // 认证相关
                    authRequired: false,
                    authenticated: false,
                    currentUsername: '',
                    // 账户管理
                    userList: [],
                    currentUserRole: '',
                    changePasswordOld: '',
                    changePasswordNew: '',
                    changePasswordConfirm: '',
                    changingPassword: false,
                    changePasswordError: '',
                    changePasswordSuccess: '',
                    newUsername: '',
                    newUserPassword: '',
                    newUserRole: 'user',
                    addingUser: false,
                    addUserError: '',
                    loginToken: '',
                    loginUsername: '',
                    loginPassword: '',
                    loggingIn: false,
                    loginError: '',
                    // 注册相关
                    needsInit: false,
                    registerUsername: '',
                    registerPassword: '',
                    registerPasswordConfirm: '',
                    registering: false,
                    registerError: ''
                };
            },
            computed: {
                onlineCount() { return this.devices.length; },
                totalUploadSpeed() { return this.devices.reduce((sum, d) => sum + (d.upload_speed || 0), 0); },
                totalDownloadSpeed() { return this.devices.reduce((sum, d) => sum + (d.download_speed || 0), 0); },
                totalUpload() { return this.devices.reduce((sum, d) => sum + (d.total_upload || 0), 0); },
                totalDownload() { return this.devices.reduce((sum, d) => sum + (d.total_download || 0), 0); },
                totalTraffic() { return this.totalUpload + this.totalDownload; },
                totalConnections() { return this.devices.reduce((sum, d) => sum + (d.connections || 0), 0); },
                connectionBadgeClass() {
                    const threshold = this.config?.monitor?.total_connection_threshold || 500;
                    const conn = this.currentConnections || this.totalConnections;
                    if (conn > threshold) return 'badge-danger';
                    if (conn > threshold * 0.7) return 'badge-warning';
                    return 'badge-success';
                },
                connectionClass() {
                    const threshold = this.config?.monitor?.total_connection_threshold || 500;
                    const conn = this.currentConnections || this.totalConnections;
                    if (conn > threshold) return 'danger';
                    if (conn > threshold * 0.7) return 'warning';
                    return 'primary';
                },
                updateStatusStyle() {
                    if (this.checkingUpdate) {
                        return { background: 'var(--input-bg)', border: '1px solid var(--border-color)' };
                    }
                    if (this.updateInfo.error) {
                        return { background: 'rgba(239, 68, 68, 0.1)', border: '1px solid rgba(239, 68, 68, 0.3)' };
                    }
                    if (this.updateInfo.has_update) {
                        return { background: 'rgba(16, 185, 129, 0.1)', border: '1px solid rgba(16, 185, 129, 0.3)' };
                    }
                    if (this.updateInfo.checked) {
                        return { background: 'rgba(6, 182, 212, 0.1)', border: '1px solid rgba(6, 182, 212, 0.3)' };
                    }
                    return { display: 'none' };
                }
            },
            methods: {
                // ========== 认证相关 ==========
                async checkAuthStatus() {
                    try {
                        const res = await axios.get('/api/auth/status');
                        this.authRequired = res.data.auth_enabled;
                        this.authenticated = res.data.authenticated;
                        this.needsInit = res.data.needs_init || false;
                        
                        if (!this.authRequired || this.authenticated) {
                            this.loadInitialData();
                        }
                    } catch (e) {
                        console.error('检查认证状态失败:', e);
                        this.authRequired = false;
                        this.loadInitialData();
                    }
                },
                async doLogin() {
                    if (!this.loginUsername) {
                        this.loginError = '请输入用户名';
                        return;
                    }
                    if (!this.loginPassword) {
                        this.loginError = '请输入密码';
                        return;
                    }
                    this.loggingIn = true;
                    this.loginError = '';
                    try {
                        const res = await axios.post('/api/auth/login', {
                            username: this.loginUsername,
                            password: this.loginPassword
                        });
                        if (res.data.success) {
                            this.authenticated = true;
                            this.currentUsername = res.data.username;
                            this.currentUserRole = res.data.role || 'user';
                            // 保存 JWT Token
                            const token = res.data.token;
                            localStorage.setItem('auth_token', token);
                            axios.defaults.headers.common['Authorization'] = 'Bearer ' + token;
                            this.loadInitialData();
                        } else {
                            this.loginError = res.data.error || '登录失败';
                        }
                    } catch (e) {
                        this.loginError = '登录失败: ' + (e.response?.data?.error || e.message);
                    } finally {
                        this.loggingIn = false;
                    }
                },
                async doRegister() {
                    // 验证用户名
                    if (!this.registerUsername) {
                        this.registerError = '请输入用户名';
                        return;
                    }
                    if (this.registerUsername.length < 3) {
                        this.registerError = '用户名至少 3 个字符';
                        return;
                    }
                    if (!/^[a-zA-Z0-9]+$/.test(this.registerUsername)) {
                        this.registerError = '用户名只能包含字母和数字';
                        return;
                    }
                    
                    // 验证密码
                    if (!this.registerPassword) {
                        this.registerError = '请输入密码';
                        return;
                    }
                    if (this.registerPassword.length < 6) {
                        this.registerError = '密码至少 6 个字符';
                        return;
                    }
                    
                    // 验证两次密码一致
                    if (this.registerPassword !== this.registerPasswordConfirm) {
                        this.registerError = '两次输入的密码不一致';
                        return;
                    }
                    
                    this.registering = true;
                    this.registerError = '';
                    
                    try {
                        const res = await axios.post('/api/auth/init', {
                            username: this.registerUsername,
                            password: this.registerPassword,
                            password_confirm: this.registerPasswordConfirm
                        });
                        
                        if (res.data.success) {
                            // 注册成功，切换到登录界面
                            this.needsInit = false;
                            this.loginUsername = this.registerUsername;
                            this.registerUsername = '';
                            this.registerPassword = '';
                            this.registerPasswordConfirm = '';
                        } else {
                            this.registerError = res.data.error || '注册失败';
                        }
                    } catch (e) {
                        this.registerError = '注册失败: ' + (e.response?.data?.error || e.message);
                    } finally {
                        this.registering = false;
                    }
                },
                // ========== 账户管理 ==========
                async loadUserList() {
                    if (!this.authenticated) return;
                    try {
                        const res = await axios.get('/api/auth/users');
                        if (res.data.success) {
                            this.userList = res.data.users || [];
                        }
                    } catch (e) {
                        console.error('获取用户列表失败:', e);
                    }
                },
                async doChangePassword() {
                    if (!this.changePasswordOld) {
                        this.changePasswordError = '请输入原密码';
                        return;
                    }
                    if (!this.changePasswordNew) {
                        this.changePasswordError = '请输入新密码';
                        return;
                    }
                    if (this.changePasswordNew.length < 6) {
                        this.changePasswordError = '新密码至少6个字符';
                        return;
                    }
                    if (this.changePasswordNew !== this.changePasswordConfirm) {
                        this.changePasswordError = '两次输入的新密码不一致';
                        return;
                    }

                    this.changingPassword = true;
                    this.changePasswordError = '';
                    this.changePasswordSuccess = '';

                    try {
                        const res = await axios.post('/api/auth/change-password', {
                            old_password: this.changePasswordOld,
                            new_password: this.changePasswordNew
                        });

                        if (res.data.success) {
                            this.changePasswordSuccess = '密码修改成功';
                            this.changePasswordOld = '';
                            this.changePasswordNew = '';
                            this.changePasswordConfirm = '';
                        } else {
                            this.changePasswordError = res.data.error || '修改失败';
                        }
                    } catch (e) {
                        this.changePasswordError = '修改失败: ' + (e.response?.data?.error || e.message);
                    } finally {
                        this.changingPassword = false;
                    }
                },
                async doAddUser() {
                    if (!this.newUsername) {
                        this.addUserError = '请输入用户名';
                        return;
                    }
                    if (this.newUsername.length < 3) {
                        this.addUserError = '用户名至少3个字符';
                        return;
                    }
                    if (!this.newUserPassword) {
                        this.addUserError = '请输入密码';
                        return;
                    }
                    if (this.newUserPassword.length < 6) {
                        this.addUserError = '密码至少6个字符';
                        return;
                    }

                    this.addingUser = true;
                    this.addUserError = '';

                    try {
                        const res = await axios.post('/api/auth/users', {
                            username: this.newUsername,
                            password: this.newUserPassword,
                            role: this.newUserRole
                        });

                        if (res.data.success) {
                            this.newUsername = '';
                            this.newUserPassword = '';
                            this.newUserRole = 'user';
                            this.loadUserList();
                        } else {
                            this.addUserError = res.data.error || '添加失败';
                        }
                    } catch (e) {
                        this.addUserError = '添加失败: ' + (e.response?.data?.error || e.message);
                    } finally {
                        this.addingUser = false;
                    }
                },
                confirmDeleteUser(username) {
                    if (confirm(`确定要删除用户 "${username}" 吗？`)) {
                        this.doDeleteUser(username);
                    }
                },
                async doDeleteUser(username) {
                    try {
                        const res = await axios.delete(`/api/auth/users/${username}`);
                        if (res.data.success) {
                            this.loadUserList();
                        } else {
                            alert(res.data.error || '删除失败');
                        }
                    } catch (e) {
                        alert('删除失败: ' + (e.response?.data?.error || e.message));
                    }
                },
                loadInitialData() {
                    Promise.all([
                        this.refreshDevices(),
                        this.refreshAlerts(),
                        this.loadConfig(),
                        this.loadSystemInfo(),
                        this.loadUserList()
                    ]).then(() => {
                        setTimeout(() => this.preloadStatsData(), 2000);
                        this.checkForUpdate();
                    }).catch(e => console.error('数据加载失败:', e));
                    
                    setInterval(() => { this.refreshDevices(); }, 5000);
                    setInterval(() => { if (this.currentPage === 'stats') this.loadTrafficHistory(); }, 5000);
                    setInterval(() => { if (this.currentPage === 'stats') { this.loadPrediction(); this.loadStats(); } }, 30000);
                    setInterval(() => { if (this.currentPage === 'alerts') this.refreshAlerts(); }, 10000);
                },
                // ========== 原有方法 ==========
                toggleMobileMenu() {
                    this.mobileMenuOpen = !this.mobileMenuOpen;
                    document.body.style.overflow = this.mobileMenuOpen ? 'hidden' : '';
                },
                closeMobileMenu() {
                    this.mobileMenuOpen = false;
                    document.body.style.overflow = '';
                },
                navigateTo(page) {
                    this.currentPage = page;
                    this.closeMobileMenu();
                },
                toggleTheme() {
                    this.isDarkMode = !this.isDarkMode;
                    localStorage.setItem('ihomeguard-theme', this.isDarkMode ? 'dark' : 'light');
                    this.applyTheme();
                    this.updateChartColors();
                },
                applyTheme() {
                    if (this.isDarkMode) {
                        document.documentElement.classList.remove('light-mode');
                    } else {
                        document.documentElement.classList.add('light-mode');
                    }
                },
                loadTheme() {
                    const saved = localStorage.getItem('ihomeguard-theme');
                    if (saved) {
                        this.isDarkMode = saved === 'dark';
                    }
                    this.applyTheme();
                },
                getChartColors() {
                    return {
                        textColor: this.isDarkMode ? '#94a3b8' : '#475569',
                        gridColor: this.isDarkMode ? 'rgba(148, 163, 184, 0.1)' : 'rgba(148, 163, 184, 0.2)',
                        cyan: this.isDarkMode ? '#06b6d4' : '#0891b2',
                        green: this.isDarkMode ? '#10b981' : '#059669',
                        purple: this.isDarkMode ? '#9b59b6' : '#7c3aed'
                    };
                },
                updateChartColors() {
                    const colors = this.getChartColors();
                    
                    if (this.realtimeChart) {
                        this.realtimeChart.options.scales.x.ticks.color = colors.textColor;
                        this.realtimeChart.options.scales.y.ticks.color = colors.textColor;
                        this.realtimeChart.options.scales.x.grid.color = colors.gridColor;
                        this.realtimeChart.options.scales.y.grid.color = colors.gridColor;
                        this.realtimeChart.data.datasets[0].borderColor = colors.cyan;
                        this.realtimeChart.data.datasets[1].borderColor = colors.green;
                        this.realtimeChart.update();
                    }
                    
                    if (this.trafficChart) {
                        this.trafficChart.options.scales.x.ticks.color = colors.textColor;
                        this.trafficChart.options.scales.y.ticks.color = colors.textColor;
                        this.trafficChart.options.scales.x.grid.color = colors.gridColor;
                        this.trafficChart.options.scales.y.grid.color = colors.gridColor;
                        this.trafficChart.update();
                    }
                },
                formatBytes(bytes) {
                    if (!bytes) return '0 B';
                    const k = 1024;
                    const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
                    const i = Math.floor(Math.log(bytes) / Math.log(k));
                    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
                },
                formatSpeed(bytes) {
                    return this.formatBytes(bytes) + '/s';
                },
                getDeviceIcon(device) {
                    const vendor = (device.vendor || '').toLowerCase();
                    const model = (device.client_model || '').toLowerCase();
                    const hostname = (device.hostname || '').toLowerCase();
                    const deviceType = (device.client_device || '').toLowerCase();
                    
                    if (hostname.includes('gateway') || hostname.includes('router') || model.includes('路由') || model.includes('网关')) return '🌐';
                    if (hostname.includes('nas') || hostname.includes('synology') || model.includes('群晖')) return '💾';
                    if (hostname.includes('server') || deviceType.includes('proxmox') || model.includes('易有云')) return '🖥️';
                    if (model.includes('phone') || model.includes('pad') || model.includes('手机') || model.includes('平板')) return '📱';
                    if (deviceType.includes('windows') || deviceType.includes('mac') || deviceType.includes('linux')) return '💻';
                    if (model.includes('音箱') || model.includes('soundbox') || hostname.includes('soundbox')) return '🔊';
                    if (model.includes('摄像') || model.includes('camera')) return '📹';

                async exportBackup() {
                    this.exporting = true;
                    this.backupStatus = null;
                    try {
                        const res = await axios.post('/api/backup/export', this.exportOptions);
                        if (res.data.success) {
                            // 创建下载
                            const dataStr = JSON.stringify(res.data.data, null, 2);
                            const blob = new Blob([dataStr], { type: 'application/json' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = res.data.filename;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                            this.backupStatus = { success: true, message: '备份文件已下载' };
                        } else {
                            this.backupStatus = { success: false, message: res.data.error };
                        }
                    } catch (e) {

                async handleImport(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    
                    // 重置 input 以便再次选择同一文件
                    event.target.value = '';
                    
                    try {
                        const text = await file.text();
                        const data = JSON.parse(text);
                        
                        // 验证格式
                        if (!data.version || !data.config) {
                            this.backupStatus = { success: false, message: '无效的备份文件格式' };
                            return;
                        }
                        
                        // 显示预览
                        this.pendingImport = {
                            filename: file.name,
                            data: data,
                            hasDevices: !!data.devices,
                            deviceCount: data.devices ? data.devices.length : 0,
                            hasAlerts: !!data.alerts,
                            alertCount: data.alerts ? data.alerts.length : 0
                        };
                        this.showImportDialog = true;
                        this.backupStatus = null;
                    } catch (e) {
                        this.backupStatus = { success: false, message: '解析文件失败: ' + e.message };
                    }
                },
                async confirmImport() {
                    if (!this.pendingImport) return;
                    
                    this.importing = true;
                    this.showImportDialog = false;
                    
                    try {
                        const res = await axios.post('/api/backup/import', {
                            backup: this.pendingImport.data,
                            merge_devices: this.importMergeMode
                        });
                        
                        if (res.data.success) {
                            const stats = res.data.stats;
                            let msg = '导入成功';
                            if (stats.config_updated) msg += '，配置已更新';
                            if (stats.devices_imported > 0) msg += `，${stats.devices_imported} 个设备`;
                            if (stats.alerts_imported > 0) msg += `，${stats.alerts_imported} 条告警`;
                            this.backupStatus = { success: true, message: msg };
                            
                            // 刷新配置
                            await this.loadConfig();
                            await this.loadBackupStats();
                        } else {
                            this.backupStatus = { success: false, message: res.data.message };
                        }
                    } catch (e) {
                        this.backupStatus = { success: false, message: '导入失败: ' + e.message };
                    } finally {
                        this.importing = false;
                        this.pendingImport = null;
                    }

                async loadTrafficHistory(useCache = true) {
                    const cacheKey = `traffic_history_${this.trafficRange}`;
                    
                    // 1. 尝试从缓存立即显示
                    if (useCache) {
                        try {
                            const cached = localStorage.getItem(cacheKey);
                            if (cached) {
                                const cachedData = JSON.parse(cached);
                                // 缓存有效期 30 秒
                                if (Date.now() - cachedData.timestamp < 30000) {
                                    this._renderTrafficData(cachedData.data);
                                    console.log('[流量历史] 使用缓存数据');
                                    return; // 缓存有效，直接返回
                                }
                            }
                        } catch (e) {
                            console.warn('[流量历史] 读取缓存失败:', e);
                        }
                    }
                    
                    // 2. 请求最新数据
                    try {
                        const res = await axios.get(`/api/traffic/history?range=${this.trafficRange}`);
                        if (res.data.success) {
                            this._renderTrafficData(res.data);
                            // 保存到缓存
                            try {
                                localStorage.setItem(cacheKey, JSON.stringify({
                                    data: res.data,
                                    timestamp: Date.now()
                                }));
                            } catch (e) {
                                // localStorage 可能已满，清理旧缓存
                                this._clearOldCache();
                            }
                        }
                    } catch (e) {
                        console.error('加载流量历史失败:', e);
                        // 请求失败时尝试使用过期缓存
                        try {
                            const cached = localStorage.getItem(cacheKey);
                            if (cached) {
                                this._renderTrafficData(JSON.parse(cached).data);
                                console.log('[流量历史] 使用过期缓存（请求失败）');
                            }
                        } catch (e2) {}
                    }
                },
                _renderTrafficData(data) {
                    // 根据时间范围决定标签格式
                    const isLongRange = ['1d', '3d', '7d'].includes(this.trafficRange);
                    const labels = data.times.map(t => {
                        const parts = t.split(' ');
                        if (parts.length > 1) {
                            if (isLongRange) {
                                const datePart = parts[0].substring(5);
                                return `${datePart} ${parts[1]}`;
                            } else {
                                return parts[1];
                            }
                        }
                        return t;
                    });

                    const dataLength = labels.length;
                    let maxTicks = isLongRange 
                        ? Math.min(15, Math.max(8, Math.floor(dataLength / 20)))
                        : Math.min(10, Math.max(5, Math.floor(dataLength / 8)));

                    // 更新实时流量图表
                    if (this.realtimeChart && this.realtimeChart.options && this.realtimeChart.options.scales) {
                        this.realtimeChart.data.labels = labels;
                        this.realtimeChart.data.datasets[0].data = data.upload_speeds;
                        this.realtimeChart.data.datasets[1].data = data.download_speeds;
                        if (this.realtimeChart.options.scales.x) {
                            this.realtimeChart.options.scales.x.ticks.maxTicksLimit = maxTicks;
                            delete this.realtimeChart.options.scales.x.min;
                            delete this.realtimeChart.options.scales.x.max;
                        }
                        this.realtimeChart.update('none');
                    }

                    // 更新连接数图表
                    if (this.connectionChart && this.connectionChart.options && this.connectionChart.options.scales) {
                        this.connectionChart.data.labels = labels;
                        this.connectionChart.data.datasets[0].data = data.connection_counts;
                        if (this.connectionChart.options.scales.x) {
                            this.connectionChart.options.scales.x.ticks.maxTicksLimit = maxTicks;
                            delete this.connectionChart.options.scales.x.min;
                            delete this.connectionChart.options.scales.x.max;
                        }
                        this.connectionChart.update('none');
                    }

                    // 更新当前连接数
                    const counts = data.connection_counts;
                    this.currentConnections = counts.length > 0 ? counts[counts.length - 1] : 0;
                },
                async loadStats(useCache = true) {
                    const cacheKey = 'stats_week';
                    
                    // 1. 尝试从缓存立即显示
                    if (useCache) {
                        try {
                            const cached = localStorage.getItem(cacheKey);
                            if (cached) {
                                const cachedData = JSON.parse(cached);
                                // 缓存有效期 60 秒（周统计变化较慢）
                                if (Date.now() - cachedData.timestamp < 60000) {
                                    this._renderStatsData(cachedData.data);
                                    console.log('[周统计] 使用缓存数据');
                                    return;
                                }
                            }
                        } catch (e) {
                            console.warn('[周统计] 读取缓存失败:', e);
                        }
                    }
                    
                    // 2. 请求最新数据
                    try {
                        const res = await axios.get('/api/stats/week');
                        if (res.data.success) {
                            this._renderStatsData(res.data);
                            // 保存到缓存
                            localStorage.setItem(cacheKey, JSON.stringify({
                                data: res.data,
                                timestamp: Date.now()
                            }));
                        }
                    } catch (e) {
                        console.error('加载统计失败:', e);
                        // 请求失败时尝试使用过期缓存
                        try {
                            const cached = localStorage.getItem(cacheKey);
                            if (cached) {
                                this._renderStatsData(JSON.parse(cached).data);
                                console.log('[周统计] 使用过期缓存（请求失败）');
                            }
                        } catch (e2) {}
                    }
                },
                _renderStatsData(data) {
                    if (this.trafficChart) {
                        this.trafficChart.data.labels = data.dates;
                        this.trafficChart.data.datasets[0].data = data.upload;
                        this.trafficChart.data.datasets[1].data = data.download;
                        this.trafficChart.update('none');
                    }
                },
                _clearOldCache() {
                    // 清理过期的缓存数据
                    const keysToRemove = [];
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        if (key && (key.startsWith('traffic_history_') || key === 'stats_week')) {
                            try {
                                const data = JSON.parse(localStorage.getItem(key));
                                // 清理超过 5 分钟的缓存
                                if (Date.now() - data.timestamp > 300000) {
                                    keysToRemove.push(key);
                                }
                            } catch (e) {
                                keysToRemove.push(key);
                            }
                        }
                    }
                    keysToRemove.forEach(key => localStorage.removeItem(key));
                    console.log('[缓存] 清理了', keysToRemove.length, '个过期缓存');
                },
                preloadStatsData() {
                    // 后台预加载统计页数据（不更新图表）
                    console.log('[预加载] 开始预加载统计页数据');
                    Promise.all([
                        axios.get('/api/stats/week').then(res => {
                            if (res.data.success) {
                                localStorage.setItem('stats_week', JSON.stringify({
                                    data: res.data,
                                    timestamp: Date.now()
                                }));
                            }
                        }).catch(() => {}),
                        axios.get('/api/traffic/history?range=1d').then(res => {
                            if (res.data.success) {
                                localStorage.setItem('traffic_history_1d', JSON.stringify({
                                    data: res.data,
                                    timestamp: Date.now()
                                }));
                            }
                        }).catch(() => {}),
                        axios.get('/api/stats/prediction').then(res => {
                            if (res.data.success) {
                                this.prediction = res.data.prediction;
                            }
                        }).catch(() => {})
                    ]).then(() => {
                        console.log('[预加载] 统计页数据预加载完成');
                    }).catch(e => console.warn('[预加载] 部分数据预加载失败:', e));
                },
                // 初始化统计页面
                initStatsPage() {
                    // 方案：使用 requestAnimationFrame + 延迟 确保 DOM 完全渲染
                    // CSS 动画 fadeIn 0.3s，需要等待动画完成
                    const initChartsAndData = () => {
                        // 初始化图表
                        this.initCharts();
                        
                        // 图表初始化后加载数据
                        setTimeout(() => {
                            // 调整图表尺寸
                            [this.realtimeChart, this.connectionChart, this.trafficChart].forEach(chart => {
                                if (chart) {
                                    chart.resize();
                                }
                            });
                            
                            // 加载数据
                            Promise.all([
                                this.loadStats(),
                                this.loadPrediction(),
                                this.loadTrafficHistory()
                            ]).catch(e => console.error('统计数据加载失败:', e));
                        }, 100);
                    };
                    
                    // 等待 CSS 动画完成（300ms）+ 额外缓冲
                    setTimeout(() => {
                        // 使用双重 requestAnimationFrame 确保布局完成
                        requestAnimationFrame(() => {
                            requestAnimationFrame(() => {
                                initChartsAndData();
                            });
                        });
                    }, 350);
                }
            },
            watch: {
                currentPage(newPage) {
                    if (newPage === 'stats') {
                        this.initStatsPage();
                    }
                    if (newPage === 'settings') {
                        this.loadDbStats();
                        this.loadBackupStats();
                    }
                }
            },
            mounted() {
                this.loadTheme();
                this.checkAuthStatus();
            }
        }).mount('#app');
    </script>
</body>
</html>
